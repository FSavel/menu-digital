<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Cozinha | Dourados</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        header {
            padding: 15px;
            text-align: center;
            background: #111;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 2px solid #222;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .audio-btn {
            background: #f1c40f;
            color: black;
            border: none;
            padding: 5px 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .board {
            display: flex;
            gap: 15px;
            padding: 15px;
            overflow-x: auto;
            align-items: flex-start;
        }

        .column {
            min-width: 300px;
            flex: 1;
            background: #1a1a1a;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        .column h2 {
            text-align: center;
            font-size: 16px;
            margin-top: 5px;
            margin-bottom: 15px;
            color: #f1c40f;
        }

        .card {
            background: #222;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: transform 0.2s;
            border-left: 4px solid transparent;
        }

        .column[data-status="Recebido"] .card { border-left-color: red; }
        .column[data-status="Em Preparação"] .card { border-left-color: orange; }
        .column[data-status="Pronto"] .card { border-left-color: #2ecc71; }
        .column[data-status="Entregue"] .card { border-left-color: #3498db; }

        .card:hover {
            transform: scale(1.02);
        }

        .cliente {
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .items {
            font-size: 13px;
            opacity: 0.9;
            white-space: pre-line;
            background: #151515;
            padding: 6px;
            border-radius: 4px;
            margin: 5px 0;
        }

        .hora {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 5px;
            text-align: right;
        }

        .actions {
            margin-top: 8px;
            display: flex;
            gap: 5px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .prep { background: orange; color: black; }
        .ready { background: #2ecc71; color: black; }
        .done { background: #3498db; color: white; }

        .new-badge {
            background: red;
            color: white;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    <span>🍽️ DOURADOS - COZINHA</span>
    <button id="audioUnlocker" class="audio-btn" onclick="unlockAudio()">🔊 Ativar Som</button>
</header>

<div class="board">
    <!-- RECEBIDO -->
    <div class="column" data-status="Recebido">
        <h2>🆕 Recebido</h2>
    </div>

    <!-- EM PREPARAÇÃO -->
    <div class="column" data-status="Em Preparação">
        <h2>👨‍🍳 A Preparar</h2>
    </div>

    <!-- PRONTO -->
    <div class="column" data-status="Pronto">
        <h2>✅ Pronto</h2>
    </div>

    <!-- ENTREGUE -->
    <div class="column" data-status="Entregue">
        <h2>📦 Entregue</h2>
    </div>
</div>

<script>
let lastHash = "";
let firstLoad = true;
let audioEnabled = false;

const NEXT_ACTION = {
    "Recebido":       { label: "Preparar", status: "Em Preparação", cls: "prep" },
    "Em Preparação":  { label: "Pronto",   status: "Pronto",        cls: "ready" },
    "Pronto":         { label: "Entregar", status: "Entregue",      cls: "done" }
};

function unlockAudio() {
    audioEnabled = true;
    const btn = document.getElementById("audioUnlocker");
    if (btn) btn.style.display = "none";
    playAlert(); // Teste de som imediato para o utilizador confirmar
}

function playAlert() {
    if (!audioEnabled) return;
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.4, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
    } catch (e) {
        console.warn("Alerta sonoro indisponível:", e);
    }
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.innerText = text == null ? "" : String(text);
    return div.innerHTML;
}

// Alteração de status assíncrona (Background AJAX)
function mudeStatus(pedidoId, novoStatus, botao) {
    botao.disabled = true;
    botao.innerText = "A processar...";

    fetch(`/admin/pedido/status/${encodeURIComponent(pedidoId)}/${encodeURIComponent(novoStatus)}`, {
        method: "POST", // Idealmente um POST para mutações de estado
        headers: { "Content-Type": "application/json" }
    })
    .then(res => {
        if (!res.ok) throw new Error("Erro na rota");
        loadOrders(); // Recarrega imediatamente para mover o card
    })
    .catch(err => {
        console.error("Erro ao atualizar status:", err);
        alert("Não foi possível atualizar o status. Tente novamente.");
        botao.disabled = false;
        loadOrders();
    });
}

function loadOrders() {
    fetch("/api/pedidos")
        .then(res => res.json())
        .then(data => {
            const pedidos = data.pedidos || [];
            const novos = pedidos.filter(p => p.status === "Recebido").length;
            const newHash = JSON.stringify(pedidos);

            if (newHash === lastHash) return;

            if (!firstLoad && novos > (window._lastNovos || 0)) {
                playAlert();
            }

            window._lastNovos = novos;
            firstLoad = false;
            lastHash = newHash;

            renderBoard(pedidos);
        })
        .catch(err => {
            console.error("Erro cozinha:", err);
        });
}

function renderBoard(pedidos) {
    document.querySelectorAll(".column").forEach(col => {
        const status = col.getAttribute("data-status");
        
        // Limpar apenas os cards antigos preservando o título original H2
        const h2 = col.querySelector("h2");
        col.innerHTML = "";
        if (h2) col.appendChild(h2);

        pedidos
            .filter(p => p.status === status)
            .forEach(p => {
                const next = NEXT_ACTION[status];
                const badge = status === "Recebido" ? '<span class="new-badge">NOVO</span>' : "";

                const card = document.createElement("div");
                card.className = "card";

                let actionHtml = "";
                if (next) {
                    actionHtml = `
                        <div class="actions">
                            <button class="btn ${next.cls}" onclick="mudeStatus('${p.id}', '${next.status}', this)">
                                ${next.label}
                            </button>
                        </div>`;
                }

                card.innerHTML = `
                    <div class="cliente">
                        <span>${escapeHtml(p.cliente || "Cliente")}</span>
                        ${badge}
                    </div>
                    <div class="items">${escapeHtml(p.items || "")}</div>
                    <div class="hora">${escapeHtml(p.hora || "")}</div>
                    ${actionHtml}
                `;
                
                col.appendChild(card);
            });
    });
}

// INIT
setInterval(loadOrders, 4000);
loadOrders();
</script>

</body>
</html>
