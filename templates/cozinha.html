<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Cozinha | Dourados</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
        }

        header {
            padding: 15px;
            text-align: center;
            background: #111;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 2px solid #222;
        }

        .board {
            display: flex;
            gap: 15px;
            padding: 15px;
            overflow-x: auto;
        }

        .column {
            min-width: 300px;
            background: #1a1a1a;
            border-radius: 10px;
            padding: 10px;
        }

        .column h2 {
            text-align: center;
            font-size: 16px;
            margin-bottom: 10px;
            color: #f1c40f;
        }

        .card {
            background: #222;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .cliente {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .items {
            font-size: 13px;
            opacity: 0.9;
        }

        .hora {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 5px;
        }

        .actions {
            margin-top: 8px;
            display: flex;
            gap: 5px;
        }

        .btn {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }

        .prep { background: orange; color: black; }
        .ready { background: #2ecc71; color: black; }
        .done { background: #3498db; color: white; }

        .new-badge {
            background: red;
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 5px;
            margin-left: 5px;
        }
    </style>
</head>

<body>

<header>
    🍽️ DOURADOS - COZINHA
</header>

<div class="board">

    <!-- RECEBIDO -->
    <div class="column" data-status="Recebido">
        <h2>🆕 Recebido</h2>
    </div>

    <!-- EM PREPARAÇÃO -->
    <div class="column" data-status="Em Preparação">
        <h2>👨‍🍳 A Preparar</h2>
    </div>

    <!-- PRONTO -->
    <div class="column" data-status="Pronto">
        <h2>✅ Pronto</h2>
    </div>

    <!-- ENTREGUE -->
    <div class="column" data-status="Entregue">
        <h2>📦 Entregue</h2>
    </div>

</div>

<!-- JS LIMPO E FUNCIONAL -->
<script>

let lastHash = "";
let firstLoad = true;

// ================================
// ESTADO -> BOTÃO SEGUINTE
// ================================
const NEXT_ACTION = {
    "Recebido":       { label: "Preparar", status: "Em Preparação", cls: "prep" },
    "Em Preparação":  { label: "Pronto",   status: "Pronto",        cls: "ready" },
    "Pronto":         { label: "Entregar", status: "Entregue",      cls: "done" }
};

// ================================
// ALERTA SONORO (Web Audio, sem ficheiro externo)
// ================================
function playAlert() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.4, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
    } catch (e) {
        console.warn("Alerta sonoro indisponível:", e);
    }
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.innerText = text == null ? "" : String(text);
    return div.innerHTML;
}

function loadOrders() {

    fetch("/api/pedidos")
        .then(res => res.json())
        .then(data => {

            const pedidos = data.pedidos || [];

            // Só conta pedidos "Recebido" para o alerta de novo pedido
            const novos = pedidos.filter(p => p.status === "Recebido").length;
            const newHash = JSON.stringify(pedidos);

            if (newHash === lastHash) return;

            if (!firstLoad && novos > (window._lastNovos || 0)) {
                playAlert();
            }

            window._lastNovos = novos;
            firstLoad = false;
            lastHash = newHash;

            renderBoard(pedidos);
        })
        .catch(err => {
            console.error("Erro cozinha:", err);
        });
}

function renderBoard(pedidos) {

    document.querySelectorAll(".column").forEach(col => {
        const status = col.getAttribute("data-status");
        const title = col.querySelector("h2").outerHTML;
        col.innerHTML = title;

        pedidos
            .filter(p => p.status === status)
            .forEach(p => {

                const next = NEXT_ACTION[status];
                const badge = status === "Recebido"
                    ? '<span class="new-badge">NOVO</span>' : "";

                const action = next
                    ? `<div class="actions">
                         <a class="btn ${next.cls}"
                            href="/admin/pedido/status/${encodeURIComponent(p.id)}/${encodeURIComponent(next.status)}">
                            ${next.label}
                         </a>
                       </div>`
                    : "";

                col.innerHTML += `
                <div class="card">
                    <div class="cliente">${escapeHtml(p.cliente || "Cliente")} ${badge}</div>
                    <div class="items">${escapeHtml(p.items || "")}</div>
                    <div class="hora">${escapeHtml(p.hora || "")}</div>
                    ${action}
                </div>`;
            });
    });
}

// INIT
setInterval(loadOrders, 4000);
loadOrders();

</script>

</body>
</html>
