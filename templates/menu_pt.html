<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    margin:0;
    background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover fixed;
}

.overlay{
    background:rgba(0,0,0,0.6);
    min-height:100vh;
    padding-bottom:40px;
}

.header{
    color:white;
    text-align:center;
    padding:20px;
    font-size:24px;
}

.category{
    background:#000000aa;
    color:white;
    padding:10px;
    margin:15px;
}

.card{
    background:white;
    margin:10px 15px;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-body{
    padding:10px;
}

.price{
    color:#27ae60;
    font-weight:bold;
}

/* CARRINHO */
.cart{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:12px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

</style>
</head>

<body>

<div class="overlay">

<div class="header">🍽️ Restaurante Digital</div>

{% set categorias = menu | groupby('Categoria') %}

{% for cat, items in categorias %}
<div class="category">{{ cat }}</div>

{% for item in items %}
<div class="card" onclick="addItem('{{ item.ID }} - {{ item.Produto_PT }}')">

{% if item.Imagem %}
<img src="{{ item.Imagem }}">
{% endif %}

<div class="card-body">
<b>[{{ item.ID }}]</b> {{ item.Produto_PT }}
<div class="price">{{ item.Preço }} MZN</div>
</div>

</div>
{% endfor %}
{% endfor %}

<div class="cart">
<h3>🛒 Seu Pedido</h3>

<form action="/pedido" method="post">
<input type="text" name="nome" placeholder="Seu nome" required>

<textarea id="pedido" name="pedido" placeholder="Itens selecionados..." required></textarea>

<button type="submit">Enviar Pedido</button>
</form>

<button onclick="limpar()">🗑️ Limpar Pedido</button>
</div>

<div style="margin:15px;">
<a href="/reserva"><button style="background:#f39c12;">📦 Reservas</button></a>
<a href="/chamar"><button style="background:#2980b9;">🙋 Garçom</button></a>
</div>

</div>

<script>
function addItem(item){
    let campo = document.getElementById("pedido");

    if(campo.value === ""){
        campo.value = item;
    } else {
        campo.value += ", " + item;
    }
}

function limpar(){
    document.getElementById("pedido").value = "";
}
</script>

</body>
</html>
