<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Sobre</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .box {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            max-width: 700px;
            margin: auto;
        }

        iframe {
            width: 100%;
            height: 250px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .contact {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🍽️ Sobre o Restaurante</h2>

    <p><strong>{{ config.NOME_RESTAURANTE }}</strong></p>
    <p>{{ config.SLOGAN }}</p>

    <div class="contact">
        <p>📞 {{ config.TELEFONE }}</p>
        <p>📧 {{ config.EMAIL }}</p>
        <p>👨‍💻 {{ config.DESENVOLVEDOR }}</p>
    </div>

    <h3>📍 Localização</h3>

    <iframe
        src="{{ config.GOOGLE_MAPS }}"
        allowfullscreen>
    </iframe>

</div>

</body>
</html>
