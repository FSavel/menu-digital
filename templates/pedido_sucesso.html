<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Pedido Enviado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
        }

        h1 {
            color: #2ecc71;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background: orange;
            color: black;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>✔️ Pedido enviado com sucesso!</h1>
    <p>Obrigado pelo seu pedido.</p>

    <a href="/">Voltar ao Menu</a>
</div>

</body>
</html>
