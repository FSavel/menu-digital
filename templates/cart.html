<!DOCTYPE html>
<html lang="pt">
<head>

    <meta charset="UTF-8">
    <title>Carrinho | Dourados</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#101010;
            color:white;
        }

        header{

            background:#181818;
            padding:18px;
            text-align:center;
            font-size:24px;
            font-weight:bold;

        }

        .container{

            max-width:700px;
            margin:auto;
            padding:20px;

        }

        .item{

            display:flex;
            justify-content:space-between;
            align-items:center;

            background:#1f1f1f;

            margin-bottom:12px;

            padding:15px;

            border-radius:10px;

        }

        .item-info{

            flex:1;

        }

        .item-info h3{

            margin:0;
            font-size:18px;

        }

        .item-info p{

            margin-top:6px;
            opacity:.8;

        }

        .controls{

            display:flex;
            align-items:center;
            gap:8px;

        }

        .controls button{

            width:35px;
            height:35px;

            border:none;

            border-radius:6px;

            cursor:pointer;

            font-size:18px;

        }

        .remove{

            background:#e74c3c;
            color:white;

        }

        .plus{

            background:#2ecc71;
            color:white;

        }

        .minus{

            background:#f39c12;
            color:white;

        }

        .total{

            margin-top:25px;

            text-align:right;

            font-size:22px;

            font-weight:bold;

        }

        .checkout{

            width:100%;

            margin-top:25px;

            padding:18px;

            background:#27ae60;

            color:white;

            border:none;

            border-radius:10px;

            font-size:18px;

            cursor:pointer;

        }

        .checkout:hover{

            background:#2ecc71;

        }

        .empty{

            text-align:center;

            margin-top:70px;

            opacity:.7;

            font-size:20px;

        }

    </style>

</head>

<body>

<header>

🛒 Carrinho

</header>

<div class="container">

    <div id="cart-items">

    </div>

    <div class="total">

        Total:
        <span id="cart-total">
            0.00
        </span>
        MT

    </div>

    <button
        class="checkout"
        onclick="checkout()">

        Confirmar Pedido

    </button>

</div>

<script src="{{ url_for('static', filename='js/cart.js') }}"></script>

<script>

renderCart();
updateCartCounter();

</script>

</body>
</html>
