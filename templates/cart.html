<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Cart | Dourados</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            margin: 0;
        }

        header {
            padding: 15px;
            text-align: center;
            font-size: 20px;
            background: #111;
        }

        .container {
            padding: 15px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e1e;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .item-name {
            flex: 2;
        }

        .item-price {
            flex: 1;
            text-align: right;
        }

        .qty {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            justify-content: center;
        }

        button {
            background: #27ae60;
            border: none;
            padding: 5px 10px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove {
            background: red;
        }

        .total {
            text-align: center;
            font-size: 18px;
            margin: 20px 0;
        }

        .checkout {
            width: 100%;
            padding: 15px;
            background: orange;
            border: none;
            font-size: 16px;
            color: black;
            border-radius: 8px;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<header>
    🛒 DOURADOS - Carrinho
</header>

<div class="container">

    <div id="cart-items"></div>

    <div class="total">
        Total: <span id="total">0</span> MT
    </div>

    <form method="POST" action="/pedido">

        <input type="hidden" name="pedido" id="pedido-data">
        <input type="hidden" name="nome" value="Cliente QR">

        <button class="checkout" type="submit">
            Confirmar Pedido
        </button>

    </form>

</div>

<script>
let cart = getCart();

function renderCart() {
    let container = document.getElementById("cart-items");
    let total = 0;

    container.innerHTML = "";

    if (cart.length === 0) {
        container.innerHTML = "<p class='empty'>Carrinho vazio</p>";
    }

    cart.forEach((item, index) => {

        total += item.price * item.qty;

        container.innerHTML += `
            <div class="item">
                <div class="item-name">${item.name}</div>

                <div class="qty">
                    <button onclick="changeQty(${index}, -1)">-</button>
                    ${item.qty}
                    <button onclick="changeQty(${index}, 1)">+</button>
                </div>

                <div class="item-price">${item.price} MT</div>

                <button class="remove" onclick="removeItem(${index})">X</button>
            </div>
        `;
    });

    document.getElementById("total").innerText = total;

    document.getElementById("pedido-data").value = JSON.stringify(cart);
}

function changeQty(i, val) {
    cart[i].qty += val;

    if (cart[i].qty <= 0) {
        cart.splice(i, 1);
    }

    save();
}

function removeItem(i) {
    cart.splice(i, 1);
    save();
}

function save() {
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
    syncCartUI();
}

renderCart();
</script>

</body>
</html>
