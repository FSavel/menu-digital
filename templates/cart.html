<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho | {{ config.NOME_RESTAURANTE }}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e1e;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
        }

        .total {
            font-size: 20px;
            margin-top: 20px;
            text-align: right;
        }

        button {
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 16px;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🛒 O teu carrinho</h2>

    <div id="cart-items"></div>

    <div class="total" id="total"></div>

    <button onclick="sendOrder()">Confirmar Pedido</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart() {

    let container = document.getElementById("cart-items");
    let totalDiv = document.getElementById("total");

    container.innerHTML = "";

    if (cart.length === 0) {
        container.innerHTML = "<p class='empty'>Carrinho vazio</p>";
        totalDiv.innerHTML = "";
        return;
    }

    let total = 0;

    cart.forEach((item, index) => {

        total += item.preco * item.quantidade;

        container.innerHTML += `
            <div class="item">
                <div>
                    <strong>${item.nome}</strong><br>
                    ${item.quantidade} x ${item.preco} MT
                </div>

                <button onclick="removeItem(${index})">❌</button>
            </div>
        `;
    });

    totalDiv.innerHTML = "Total: " + total + " MT";
}

function removeItem(index) {

    cart.splice(index, 1);

    localStorage.setItem("cart", JSON.stringify(cart));

    renderCart();
}

function sendOrder() {

    if (cart.length === 0) {
        alert("Carrinho vazio!");
        return;
    }

    fetch("/pedido", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            cart: cart
        })
    })
    .then(res => res.json())
    .then(data => {

        localStorage.removeItem("cart");

        window.location.href = "/pedido-sucesso";

    });

}

renderCart();

</script>

</body>
</html>
