<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Escolher Idioma</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            width: 300px;
        }

        h1 {
            margin-bottom: 20px;
        }

        a {
            display: block;
            margin: 10px 0;
            padding: 12px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        a:hover {
            background: #2ecc71;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>🍽️ {{ config.NOME_RESTAURANTE }}</h1>
    <p>{{ config.SLOGAN }}</p>

    <a href="/menu_pt">🇵🇹 Português</a>
    <a href="/menu_en">🇬🇧 English</a>
</div>

</body>
</html>
