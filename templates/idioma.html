<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dourados</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover fixed;
}

.overlay{
    background:rgba(0,0,0,0.7);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.container{
    background:rgba(0,0,0,0.6);
    padding:30px;
    border-radius:15px;
    width:100%;
    max-width:400px;
}

h1{
    color:white;
    margin-bottom:10px;
}

p{
    color:#ddd;
    font-size:14px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.btn-pt{
    background:#27ae60;
    color:white;
}

.btn-en{
    background:#2980b9;
    color:white;
}

.btn-sobre{
    background:#8e44ad;
    color:white;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#bbb;
}

/* MOBILE */
@media(max-width:768px){
    h1{font-size:22px;}
}
</style>

</head>

<body>

<div class="overlay">

<div class="container">

<h1>🍽️ Dourados</h1>

<p>Bem-vindo / Welcome</p>

<!-- BOTÕES IDIOMA -->
<a href="/menu_pt">
<button class="btn-pt">🇵🇹 Português</button>
</a>

<a href="/menu_en">
<button class="btn-en">🇬🇧 English</button>
</a>

<!-- SOBRE -->
<a href="/sobre">
<button class="btn-sobre">ℹ️ Sobre / Contacto</button>
</a>

<div class="footer">
<p>Experiência digital moderna 🍽️</p>
</div>

</div>

</div>

</body>
</html>
