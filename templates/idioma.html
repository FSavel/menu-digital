<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escolher Idioma</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover fixed;
}

.overlay{
    background: rgba(0,0,0,0.6);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

.title{
    color:white;
    font-size:28px;
    font-weight:bold;
    margin-bottom:30px;
}

.btn{
    width:200px;
    padding:15px;
    margin:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.pt{
    background:#27ae60;
    color:white;
}

.en{
    background:#111;
    color:white;
}

/* 📱 MOBILE */
@media (max-width: 768px){
    .title{
        font-size:22px;
    }

    .btn{
        width:80%;
        font-size:16px;
    }
}
</style>

</head>

<body>

<div class="overlay">

<div class="title">
🍽️ Escolha o Idioma / Choose Language
</div>

<a href="/menu_pt">
<button class="btn pt">Português</button>
</a>

<a href="/menu_en">
<button class="btn en">English</button>
</a>

</div>

</body>
</html>
