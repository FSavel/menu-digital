<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome</title>

<style>

body{

    margin:0;
    background:#101010;
    color:white;

    font-family:Arial;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

}

.card{

    text-align:center;

}

.logo{

    font-size:70px;
    margin-bottom:20px;

}

h1{

    margin-bottom:10px;

}

p{

    opacity:.7;
    margin-bottom:40px;

}

.lang{

    display:flex;
    flex-direction:column;
    gap:20px;

}

.lang a{

    text-decoration:none;

    color:white;

    background:#27ae60;

    padding:18px;

    border-radius:12px;

    font-size:22px;

    transition:.2s;

}

.lang a:hover{

    transform:scale(1.04);

    background:#2ecc71;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">
🍽️
</div>

<h1>
Bem-vindo
</h1>

<h3>
Welcome
</h3>

<p>

Escolha a língua<br>

Choose your language

</p>

<div class="lang">

<a href="/set_language/pt">

🇵🇹 Português

</a>

<a href="/set_language/en">

🇬🇧 English

</a>

</div>

</div>

</body>

</html>
