<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Administrativo | Dourados</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Chart.js para os gráficos sem complicações -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        header {
            padding: 15px 30px;
            background: #111;
            border-bottom: 2px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            color: #f1c40f;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
            margin-left: 20px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #f1c40f;
        }

        .container {
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Grid de Métricas Rápidas */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #f1c40f;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .metric-card h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-card .value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        /* Área dos Gráficos e Tabelas */
        .dashboard-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .dashboard-content {
                grid-template-columns: 1fr;
            }
        }

        .chart-section, .recent-section {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .chart-section h2, .recent-section h2 {
            margin-top: 0;
            font-size: 16px;
            color: #f1c40f;
            margin-bottom: 20px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        /* Lista de Últimos Pedidos */
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .order-row {
            background: #222;
            padding: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .order-info .client-name {
            font-weight: bold;
            margin-bottom: 3px;
        }

        .order-info .order-time {
            font-size: 11px;
            color: #666;
        }

        .order-value {
            font-weight: bold;
            color: #2ecc71;
            text-align: right;
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
            font-weight: bold;
        }

        .status-recebido { background: rgba(255,0,0,0.2); color: #ff4a4a; }
        .status-preparacao { background: rgba(255,165,0,0.2); color: orange; }
        .status-pronto { background: rgba(46,204,113,0.2); color: #2ecc71; }
        .status-entregue { background: rgba(52,152,219,0.2); color: #3498db; }
    </style>
</head>
<body>

<header>
    <h1>📈 DOURADOS - ADMIN</h1>
    <div class="nav-links">
        <a href="/cozinha" target="_blank">📋 Monitor da Cozinha</a>
        <a href="#" onclick="fetchData()">🔄 Atualizar</a>
    </div>
</header>

<div class="container">
    <!-- Linha de Cartões de Métricas -->
    <div class="metrics-grid">
        <div class="metric-card">
            <h3>Faturamento Hoje</h3>
            <div class="value" id="revenue-today">0,00 €</div>
        </div>
        <div class="metric-card">
            <h3>Pedidos Hoje</h3>
            <div class="value" id="orders-count">0</div>
        </div>
        <div class="metric-card">
            <h3>Ticket Médio</h3>
            <div class="value" id="ticket-average">0,00 €</div>
        </div>
        <div class="metric-card">
            <h3>Em Preparação</h3>
            <div class="value" id="pending-kitchen">0</div>
        </div>
    </div>

    <div class="dashboard-content">
        <!-- Gráfico de Vendas -->
        <div class="chart-section">
            <h2>Vendas por Hora (Hoje)</h2>
            <div class="chart-container">
                <canvas id="salesChart"></canvas>
            </div>
        </div>

        <!-- Últimos Pedidos Registados -->
        <div class="recent-section">
            <h2>Últimos Pedidos</h2>
            <div class="order-list" id="recent-orders-container">
                <!-- Inserido via JS -->
            </div>
        </div>
    </div>
</div>

<script>
let salesChart = null;

function initChart(labels = [], datasetData = []) {
    const ctx = document.getElementById('salesChart').getContext('2d');
    
    if (salesChart) {
        salesChart.destroy();
    }

    salesChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Faturamento (€)',
                data: datasetData,
                borderColor: '#f1c40f',
                backgroundColor: 'rgba(241, 196, 15, 0.1)',
                borderWidth: 2,
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    grid: { color: '#222' },
                    ticks: { color: '#aaa' }
                },
                x: {
                    grid: { display: false },
                    ticks: { color: '#aaa' }
                }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.innerText = text == null ? "" : String(text);
    return div.innerHTML;
}

function fetchData() {
    fetch("/api/pedidos")
        .then(res => res.json())
        .then(data => {
            const pedidos = data.pedidos || [];
            
            // 1. Processar métricas básicas
            let totalRevenue = 0;
            let totalOrdersToday = pedidos.length;
            let activeInKitchen = 0;
            
            // Objeto para agrupar faturamento por hora (ex: "12:00", "13:00")
            const hourlySales = {};

            pedidos.forEach(p => {
                const valor = parseFloat(p.total) || 0;
                totalRevenue += valor;
                
                if (p.status === "Em Preparação" || p.status === "Recebido") {
                    activeInKitchen++;
                }

                // Agrupamento por hora rudimentar baseado na string p.hora (ex: "13:45" -> "13h")
                if (p.hora) {
                    const horaFatiada = p.hora.split(':')[0] + "h";
                    hourlySales[horaFatiada] = (hourlySales[horaFatiada] || 0) + valor;
                }
            });

            const ticketAverage = totalOrdersToday > 0 ? (totalRevenue / totalOrdersToday) : 0;

            // Atualizar UI dos cards
            document.getElementById("revenue-today").innerText = totalRevenue.toFixed(2).replace('.', ',') + " €";
            document.getElementById("orders-count").innerText = totalOrdersToday;
            document.getElementById("ticket-average").innerText = ticketAverage.toFixed(2).replace('.', ',') + " €";
            document.getElementById("pending-kitchen").innerText = activeInKitchen;

            // 2. Atualizar o gráfico
            const chartLabels = Object.keys(hourlySales).sort();
            const chartData = chartLabels.map(label => hourlySales[label]);
            initChart(chartLabels, chartData);

            // 3. Renderizar últimos 5 pedidos
            const recentOrdersContainer = document.getElementById("recent-orders-container");
            recentOrdersContainer.innerHTML = "";

            // Mostra os mais recentes primeiro
            const topPedidos = [...pedidos].reverse().slice(0, 5);

            if (topPedidos.length === 0) {
                recentOrdersContainer.innerHTML = '<div style="font-size:13px; color:#666; text-align:center; padding:20px;">Nenhum pedido registado hoje.</div>';
            }

            topPedidos.forEach(p => {
                let statusClass = "status-recebido";
                if (p.status === "Em Preparação") statusClass = "status-preparacao";
                if (p.status === "Pronto") statusClass = "status-pronto";
                if (p.status === "Entregue") statusClass = "status-entregue";

                const valorFormatado = (parseFloat(p.total) || 0).toFixed(2).replace('.', ',') + " €";

                recentOrdersContainer.innerHTML += `
                    <div class="order-row">
                        <div class="order-info">
                            <div class="client-name">${escapeHtml(p.cliente || "Cliente")}</div>
                            <div class="order-time">${escapeHtml(p.hora || "")}</div>
                            <span class="status-badge ${statusClass}">${escapeHtml(p.status || "Recebido")}</span>
                        </div>
                        <div class="order-value">${valorFormatado}</div>
                    </div>
                `;
            });
        })
        .catch(err => console.error("Erro ao carregar dados do dashboard:", err));
}

// Inicialização automática e atualização a cada 15 segundos
initChart();
fetchData();
setInterval(fetchData, 15000);
</script>

</body>
</html>
