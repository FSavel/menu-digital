<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Menu</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover fixed;
}

.overlay{
    background:rgba(0,0,0,0.6);
    min-height:100vh;
    padding-bottom:40px;
}

.header{
    color:white;
    text-align:center;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.category{
    background:rgba(0,0,0,0.75);
    color:white;
    padding:10px;
    margin:15px;
    border-left:5px solid #27ae60;
    font-weight:bold;
}

.card{
    background:white;
    margin:10px 15px;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    display:flex;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.card img{
    width:90px;
    height:90px;
    object-fit:cover;
}

.card-body{
    padding:10px;
    display:flex;
    justify-content:space-between;
    width:100%;
}

.price{
    color:#27ae60;
    font-weight:bold;
}

.cart{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:12px;
}

.item{
    display:flex;
    justify-content:space-between;
    margin:5px 0;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

.btn-send{background:#27ae60;color:white;}
.btn-clear{background:#e74c3c;color:white;}

.total{
    font-weight:bold;
    margin-top:10px;
}

/* MOBILE */
@media(max-width:768px){
    .card{flex-direction:column;}
}
</style>
</head>

<body>

<div class="overlay">

<div class="header">
🍽️ Digital Menu <br>
<small>Click dishes to add to order</small>
</div>

{% set categorias = menu | groupby('Categoria') %}

{% for cat, items in categorias %}
<div class="category">{{ cat }}</div>

{% for item in items %}
<div class="card" onclick="addItem('{{ item.ID }}','{{ item.Produto_EN }}',{{ item.Preço }})">

{% if item.Imagem %}
<img src="{{ item.Imagem }}">
{% endif %}

<div class="card-body">
<div>{{ item.Produto_EN }}</div>
<div class="price">{{ item.Preço }} MZN</div>
</div>

</div>
{% endfor %}
{% endfor %}

<!-- CART -->
<div class="cart">

<h3>🛒 Your Order</h3>

<input type="text" id="nome" placeholder="Your name">

<div id="cart"></div>

<div class="total">Total: <span id="total">0</span> MZN</div>

<form action="/pedido" method="post" onsubmit="prepareOrder()">
<input type="hidden" name="pedido" id="pedido">
<input type="hidden" name="nome_hidden" id="nome_hidden">

<button type="submit" class="btn-send">Send Order</button>
</form>

<button class="btn-clear" onclick="clearCart()">Clear</button>

</div>

</div>

<script>

let cart = [];
let total = 0;

function addItem(id,name,price){

    let existing = cart.find(i => i.id === id);

    if(existing){
        existing.qty += 1;
    } else {
        cart.push({id,name,price,qty:1});
    }

    updateCart();
}

function updateCart(){

    let div = document.getElementById("cart");
    div.innerHTML = "";
    total = 0;

    cart.forEach((item,index)=>{

        total += item.price * item.qty;

        div.innerHTML += `
        <div class="item">
            ${item.name} x${item.qty}
            <button onclick="removeItem(${index})">X</button>
        </div>`;
    });

    document.getElementById("total").innerText = total;
}

function removeItem(index){
    cart.splice(index,1);
    updateCart();
}

function clearCart(){
    cart = [];
    updateCart();
}

function prepareOrder(){
    document.getElementById("pedido").value = JSON.stringify(cart);
    document.getElementById("nome_hidden").value = document.getElementById("nome").value;
}

</script>

</body>
</html>
