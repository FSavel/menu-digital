<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Menu</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover fixed;
}

.overlay{
    background:rgba(0,0,0,0.6);
    min-height:100vh;
    padding-bottom:40px;
}

.header{
    color:white;
    text-align:center;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.category{
    background:rgba(0,0,0,0.75);
    color:white;
    padding:10px;
    margin:15px;
    border-left:5px solid #27ae60;
}

.card{
    background:white;
    margin:10px 15px;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    display:flex;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.02);
}

.card img{
    width:90px;
    height:90px;
    object-fit:cover;
}

.card-body{
    padding:10px;
    display:flex;
    justify-content:space-between;
    width:100%;
}

.price{
    color:#27ae60;
    font-weight:bold;
}

.cart{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:12px;
}

input, textarea, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{border:none;font-size:16px;}

.btn-send{background:#27ae60;color:white;}
.btn-clear{background:#e74c3c;color:white;}

.extra-buttons{margin:15px;}
.extra-buttons button{width:100%;margin-top:10px;color:white;}

.btn-reserva{background:#f39c12;}
.btn-waiter{background:#2980b9;}

@media(max-width:768px){
    .card{flex-direction:column;}
}
</style>
</head>

<body>

<div class="overlay">

<div class="header">
🍽️ Digital Menu <br>
<small>Click dishes to add to order</small>
</div>

{% set categorias = menu | groupby('Categoria') %}

{% for cat, items in categorias %}
<div class="category">{{ cat }}</div>

{% for item in items %}
<div class="card" onclick="addItem('{{ item.ID }} - {{ item.Produto_EN }}')">

{% if item.Imagem %}
<img src="{{ item.Imagem }}">
{% endif %}

<div class="card-body">
<div>{{ item.Produto_EN }}</div>
<div class="price">{{ item.Preço }} MZN</div>
</div>

</div>
{% endfor %}
{% endfor %}

<div class="cart">

<h3>🛒 Your Order</h3>

<form action="/pedido" method="post">

<input type="text" name="nome" placeholder="Your name" required>

<textarea id="pedido" name="pedido" placeholder="Click dishes..." required></textarea>

<button type="submit" class="btn-send">Send Order</button>

</form>

<button class="btn-clear" onclick="limpar()">Clear</button>

</div>

<div class="extra-buttons">

<a href="/reserva"><button class="btn-reserva">📦 Reservations</button></a>
<a href="/chamar"><button class="btn-waiter">🙋 Call Waiter</button></a>
<a href="/pedidos"><button style="background:#2c3e50;">📊 View Orders</button></a>

</div>

</div>

<script>
function addItem(item){
    let campo = document.getElementById("pedido");
    campo.value = campo.value ? campo.value + ", " + item : item;
}

function limpar(){
    document.getElementById("pedido").value = "";
}
</script>

</body>
</html>
