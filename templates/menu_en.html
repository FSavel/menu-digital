<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Menu</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover fixed;
}

.overlay{
    background:rgba(0,0,0,0.6);
    min-height:100vh;
    padding-bottom:40px;
}

.header{
    color:white;
    text-align:center;
    padding:20px;
    font-size:24px;
    font-weight:bold;
}

.category{
    background:rgba(0,0,0,0.75);
    color:white;
    padding:10px;
    margin:15px;
    border-left:5px solid #27ae60;
    font-weight:bold;
}

.card{
    background:white;
    margin:10px 15px;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:row;
    transition:0.2s;
}

.card:hover{
    transform:scale(1.02);
}

.card img{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:10px;
}

.card-body{
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:100%;
}

.name{
    flex:1;
    margin-left:10px;
}

.price{
    color:#27ae60;
    font-weight:bold;
}

/* CART */
.cart{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:12px;
}

input, textarea, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    border:none;
    font-size:16px;
}

.btn-send{
    background:#27ae60;
    color:white;
}

.btn-clear{
    background:#e74c3c;
    color:white;
}

/* EXTRA BUTTONS */
.extra-buttons{
    margin:15px;
}

.extra-buttons button{
    margin-top:10px;
    color:white;
    width:100%;
}

.btn-reserva{
    background:#f39c12;
}

.btn-waiter{
    background:#2980b9;
}

/* MOBILE */
@media(max-width:768px){
    .card{
        flex-direction:column;
        align-items:flex-start;
    }

    .card-body{
        flex-direction:column;
        align-items:flex-start;
        gap:5px;
    }

    .name{
        margin-left:0;
    }

    .card img{
        width:100%;
        height:160px;
    }
}

html, body{
    overflow-x:hidden;
}
</style>

</head>

<body>

<div class="overlay">

<div class="header">
🍽️ Digital Restaurant Menu
</div>

{% set categorias = menu | groupby('Categoria') %}

{% for cat, items in categorias %}
<div class="category">{{ cat }}</div>

{% for item in items %}

<div class="card" onclick="addItem('{{ item.ID }} - {{ item.Produto_EN }}')">

{% if item.Imagem %}
<img src="{{ item.Imagem }}">
{% endif %}

<div class="card-body">
<div class="name">
<b>[{{ item.ID }}]</b> {{ item.Produto_EN }}
</div>

<div class="price">
{{ item.Preço }} MZN
</div>
</div>

</div>

{% endfor %}
{% endfor %}

<!-- CART -->
<div class="cart">

<h3>🛒 Your Order</h3>

<form action="/pedido" method="post">

<input type="text" name="nome" placeholder="Your name" required>

<textarea id="pedido" name="pedido" placeholder="Click dishes to add..." required></textarea>

<button type="submit" class="btn-send">Send Order</button>

</form>

<button class="btn-clear" onclick="limpar()">🗑️ Clear Order</button>

</div>

<!-- EXTRA BUTTONS -->
<div class="extra-buttons">

<a href="/reserva">
<button class="btn-reserva">📦 Special Reservations</button>
</a>

<a href="/chamar">
<button class="btn-waiter">🙋 Call Waiter</button>
</a>

</div>

</div>

<script>
function addItem(item){
    let campo = document.getElementById("pedido");

    if(campo.value === ""){
        campo.value = item;
    } else {
        campo.value += ", " + item;
    }
}

function limpar(){
    document.getElementById("pedido").value = "";
}
</script>

</body>
</html>
