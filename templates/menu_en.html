<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Menu</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:0;
}

.header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.category{
    background:#222;
    color:white;
    padding:10px 15px;
    margin-top:20px;
    font-size:18px;
}

.card{
    background:white;
    margin:10px 15px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.id{
    font-weight:bold;
    color:#555;
    margin-right:10px;
}

.name{
    flex:1;
}

.price{
    font-weight:bold;
    color:#27ae60;
}

.order-box{
    background:white;
    margin:20px 15px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    background:#111;
    color:white;
    border:none;
    font-weight:bold;
}

button:hover{
    background:#333;
}

.waiter{
    background:#e74c3c;
    color:white;
    text-align:center;
    padding:12px;
    margin:15px;
    border-radius:10px;
    text-decoration:none;
    display:block;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
🍽️ Digital Menu
</div>

{% set categorias = menu | groupby('Categoria') %}

{% for cat, items in categorias %}

<div class="category">
{{ cat }}
</div>

{% for item in items %}
<div class="card">
    <div class="id">[{{ item.ID }}]</div>
    <div class="name">{{ item.Produto }}</div>
    <div class="price">{{ item.Preço }} MZN</div>
</div>
{% endfor %}

{% endfor %}

<div class="order-box">
<h3>🛒 Place Order</h3>

<form action="/pedido" method="post">

<input type="text" name="nome" placeholder="Your name" required>

<input type="text" name="pedido" placeholder="Ex: 05, 07, 12" required>

<button type="submit">Send Order</button>

</form>
</div>

<a class="waiter" href="/chamar">
🙋 Call Waiter
</a>

</body>
</html>
